services:
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=tenant
      - POSTGRES_PASSWORD=tenant
      - POSTGRES_DB=tenantvault
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tenant -d tenantvault"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3.0.0
    environment:
      - SERVICES=kms
      - DEFAULT_REGION=us-east-1
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4566/_localstack/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  localstack_data:
